name: Pipeline CI/CD DevOps

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'hotfix/**'

  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build, Test y Docker
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      MONGO_URI: mongodb://localhost:27017/mi_base_datos

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas unitarias y cobertura
        run: npm test -- --coverage

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: reporte-cobertura
          path: coverage/

      - name: Escaneo de seguridad (Simulación)
        run: |
          echo "======================================"
          echo "Escaneo de Seguridad"
          echo "======================================"
          echo "SonarCloud: OK"
          echo "Snyk: OK"
          echo "0 vulnerabilidades críticas encontradas."

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y subir imagen a Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/microservicio-devops:latest

      - name: Pipeline finalizado
        run: echo "Pipeline ejecutado correctamente."